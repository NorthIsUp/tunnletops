name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tunnletops-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tunnletops-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tunnletops-x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tunnletops-aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tunnletops-x86_64-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/tunnletops ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/tunnletops.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum tunnletops-* > checksums-sha256.txt

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          # Extract the [version] section from CHANGELOG.md (stops at next ## heading).
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "No changelog entry found for v${version}; using auto-generated notes only."
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            {
              echo 'notes<<CHANGELOG_EOF'
              echo "$notes"
              echo 'CHANGELOG_EOF'
            } >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: true
          files: |
            artifacts/tunnletops-*
            artifacts/checksums-sha256.txt
