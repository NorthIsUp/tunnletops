name: Release

# Code-driven releases: a push to `main` that bumps the Cargo.toml version
# (so the corresponding `v<version>` tag doesn't exist on origin yet)
# automatically tags the commit, builds release binaries, and publishes
# a GitHub release. No manual `git push origin <tag>` step.
#
# The `check-version` job gates everything: if the tag for the current
# Cargo.toml version already exists, build and release jobs are skipped.
# That makes doc-only / CI-only pushes to main free.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        name: Read Cargo.toml version and check for existing tag
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists on origin — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$version does not exist on origin — will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tunneltops-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tunneltops-aarch64-linux
          # x86_64-apple-darwin dropped: ort doesn't publish prebuilt
          # ONNX Runtime binaries for it. Apple Silicon covers modern Macs;
          # Intel users can run the aarch64 build via Rosetta.
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tunneltops-aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tunneltops-x86_64-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/tunneltops ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/tunneltops.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum tunneltops-* > checksums-sha256.txt

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ needs.check-version.outputs.version }}"
          # Pull the [version] section from CHANGELOG.md, stopping at the next `## [` heading.
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "No changelog entry found for v${version}; using auto-generated notes only."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'notes<<CHANGELOG_EOF'
              echo "$notes"
              echo 'CHANGELOG_EOF'
            } >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi

      # `softprops/action-gh-release` creates the git tag at the checked-out
      # commit if it doesn't already exist, so no separate `git tag && git push`
      # step is needed. The tag is always on the release commit itself, which
      # avoids the "tag points at wrong commit" class of bug entirely.
      - name: Create release (creates the tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: true
          files: |
            artifacts/tunneltops-*
            artifacts/checksums-sha256.txt
